<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- charset je atribut který určuje znakové kódování > UTF-8 je nejpoužívanější znakové kódování (zajiťuje že se všechny znaky zobrazí správně)-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- name="viewport" > říká že nastavujeme vlastnosti pro viewport, což je viditelná oblast stránky 
                                                                                content="..." > obsahuje konkrétní pravidla pro viewport
                                                                                width="device-width" > nastaví šířku viewportu na šířku zařízení
                                                                                initial-scale=1.0 > nastaví počáteční měřítko stránky na 1.0 (základní)--> 
    <title>Document</title> <!-- title > co bude napsáno na listu okna-->
</head>
<body>
    
</body>
</html>
